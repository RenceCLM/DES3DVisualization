<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>DES 3D Journey</title>
	<style>
		:root {
			--bg0: #eef3f8;
			--bg1: #e1e9f2;
			--panel: rgba(255, 255, 255, 0.78);
			--ink: #1f2d3d;
			--muted: #4d6178;
			--line: rgba(31, 45, 61, 0.16);
			--blue: #2f80ed;
			--whitebit: #e8edf3;
		}

		* {
			box-sizing: border-box;
		}

		html,
		body {
			margin: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
			font-family: "Avenir Next", "Helvetica Neue", sans-serif;
			color: var(--ink);
			background:
				radial-gradient(1200px 600px at 12% 8%, #ffffff 0%, transparent 60%),
				radial-gradient(900px 500px at 90% 82%, #f7fafc 0%, transparent 60%),
				linear-gradient(160deg, var(--bg0), var(--bg1));
		}

		#app {
			position: fixed;
			inset: 0;
		}

		#hud {
			position: fixed;
			left: 18px;
			top: 18px;
			max-width: min(560px, calc(100vw - 36px));
			z-index: 5;
			background: var(--panel);
			border: 1px solid var(--line);
			border-radius: 14px;
			backdrop-filter: blur(10px);
			padding: 10px 12px;
			box-shadow: 0 12px 34px rgba(31, 45, 61, 0.12);
			opacity: 0;
			transform: translateY(8px);
			transition: opacity 0.28s ease, transform 0.28s ease;
		}

		#hud.show {
			opacity: 1;
			transform: translateY(0);
		}

		#hudTitle {
			margin: 0;
			font-size: 0.84rem;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			color: #2d4a66;
		}

		#hudText {
			margin: 4px 0 0;
			font-size: 0.92rem;
			color: #3f5871;
			line-height: 1.35;
		}

		#entry {
			position: fixed;
			inset: 0;
			z-index: 6;
			display: grid;
			place-items: center;
			transition: opacity 0.42s ease;
			background:
				radial-gradient(1000px 540px at 50% 30%, rgba(255, 255, 255, 0.85), rgba(235, 242, 250, 0.92)),
				linear-gradient(145deg, #f5f9fd, #e7eef7);
		}

		#split {
			width: min(1160px, 94vw);
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 0;
			border: 1px solid rgba(35, 55, 80, 0.16);
			border-radius: 18px;
			overflow: hidden;
			box-shadow: 0 24px 54px rgba(31, 45, 61, 0.16);
			background: rgba(255, 255, 255, 0.86);
			transition: transform 0.6s ease, box-shadow 0.6s ease;
		}

		.pane {
			padding: 18px;
			display: flex;
			flex-direction: column;
			gap: 10px;
			min-height: 260px;
			transition: all 0.5s ease;
		}

		.pane.left {
			background: rgba(255, 255, 255, 0.92);
		}

		.pane.right {
			background: rgba(242, 247, 253, 0.95);
			border-left: 1px solid rgba(35, 55, 80, 0.14);
		}

		#split.takeover {
			grid-template-columns: 1fr 0fr;
		}

		#split.takeover .pane.right {
			opacity: 0;
			transform: translateX(30px);
			pointer-events: none;
		}

		#split.takeover .pane.left {
			padding-right: 28px;
		}

		.kicker {
			margin: 0;
			font-size: 0.82rem;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			color: #4a6887;
		}

		.field {
			border: 0;
			outline: none;
			padding: 12px;
			border-radius: 12px;
			width: 100%;
			font-size: 1rem;
			color: #1f2d3d;
			background: rgba(255, 255, 255, 0.92);
			box-shadow: inset 0 0 0 1px rgba(35, 55, 80, 0.16);
		}

		#cta {
			margin-top: auto;
			border: 0;
			border-radius: 12px;
			height: 46px;
			font-size: 1rem;
			font-weight: 700;
			cursor: pointer;
			color: #fff;
			background: linear-gradient(115deg, #2675d8, #3b91ff);
			box-shadow: 0 12px 24px rgba(47, 128, 237, 0.3);
		}

		#legend {
			position: fixed;
			right: 18px;
			top: 18px;
			z-index: 5;
			background: var(--panel);
			border: 1px solid var(--line);
			border-radius: 12px;
			padding: 8px 10px;
			font-size: 0.82rem;
			color: var(--muted);
			box-shadow: 0 12px 34px rgba(31, 45, 61, 0.12);
			backdrop-filter: blur(10px);
		}

		#mobileBlock {
			position: fixed;
			inset: 0;
			z-index: 20;
			display: none;
			place-items: center;
			text-align: center;
			padding: 24px;
			background:
				radial-gradient(900px 420px at 50% 20%, rgba(255, 255, 255, 0.84), rgba(235, 242, 250, 0.94)),
				linear-gradient(145deg, #f5f9fd, #e7eef7);
			color: #1f2d3d;
			font-family: "Avenir Next", "Helvetica Neue", sans-serif;
		}

		#mobileBlock .card {
			max-width: 540px;
			background: rgba(255, 255, 255, 0.88);
			border: 1px solid rgba(35, 55, 80, 0.16);
			border-radius: 14px;
			padding: 20px;
			box-shadow: 0 14px 30px rgba(31, 45, 61, 0.14);
		}

		#mobileBlock h2 {
			margin: 0 0 8px;
			font-size: 1.16rem;
			letter-spacing: 0.03em;
		}

		#mobileBlock p {
			margin: 0;
			font-size: 0.96rem;
			line-height: 1.42;
			color: #3d5874;
		}

		@media (max-width: 860px) {
			#split {
				grid-template-columns: 1fr;
			}

			.pane.right {
				border-left: 0;
				border-top: 1px solid rgba(35, 55, 80, 0.14);
			}

			#split.takeover {
				grid-template-columns: 1fr;
			}

			#split.takeover .pane.right {
				display: none;
			}
		}
	</style>
</head>
<body>
	<div id="app"></div>

	<div id="hud">
		<p id="hudTitle"></p>
		<p id="hudText"></p>
	</div>

	<div id="entry">
		<form id="split" autocomplete="off">
			<div class="pane left">

				<input id="plaintext" class="field" maxlength="32" placeholder="Type plaintext (DES takes first 8 chars per block)" value="DES-DEMO" />
			</div>
			<div class="pane right">
				<p class="kicker">Secret Key (8 chars)</p>
				<input id="keytext" class="field" maxlength="8" placeholder="Type 8-char key" value="SeCr3t!!" />
				<button id="cta" type="submit">Start</button>

	<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
	<script type="module">

			[[15,1,8,14,6,11,3,4,9,7,2,13,12,0,5,10],[3,13,4,7,15,2,8,14,12,0,1,10,6,9,11,5],[0,14,7,11,10,4,13,1,5,8,12,6,9,3,2,15],[13,8,10,1,3,15,4,2,11,6,7,12,0,5,14,9]],
			[[10,0,9,14,6,3,15,5,1,13,12,7,11,4,2,8],[13,7,0,9,3,4,6,10,2,8,5,14,12,11,15,1],[13,6,4,9,8,15,3,0,11,1,2,12,5,10,14,7],[1,10,13,0,6,9,8,7,4,15,14,3,11,5,2,12]],
			[[7,13,14,3,0,6,9,10,1,2,8,5,11,12,4,15],[13,8,11,5,6,15,0,3,4,7,2,12,1,10,14,9],[10,6,9,0,12,11,7,13,15,1,3,14,5,2,8,4],[3,15,0,6,10,1,13,8,9,4,5,11,12,7,2,14]],
			[[2,12,4,1,7,10,11,6,8,5,3,15,13,0,14,9],[14,11,2,12,4,7,13,1,5,0,15,10,3,9,8,6],[4,2,1,11,10,13,7,8,15,9,12,5,6,3,0,14],[11,8,12,7,1,14,2,13,6,15,0,9,10,4,5,3]],
			[[12,1,10,15,9,2,6,8,0,13,3,4,14,7,5,11],[10,15,4,2,7,12,9,5,6,1,13,14,0,11,3,8],[9,14,15,5,2,8,12,3,7,0,4,10,1,13,11,6],[4,3,2,12,9,5,15,10,11,14,1,7,6,0,8,13]],
			[[4,11,2,14,15,0,8,13,3,12,9,7,5,10,6,1],[13,0,11,7,4,9,1,10,14,3,5,12,2,15,8,6],[1,4,11,13,12,3,7,14,10,15,6,8,0,5,9,2],[6,11,13,8,1,4,10,7,9,5,0,15,14,2,3,12]],
			[[13,2,8,4,6,15,11,1,10,9,3,14,5,0,12,7],[1,15,13,8,10,3,7,4,12,5,6,11,0,14,9,2],[7,11,4,1,9,12,14,2,0,6,10,13,15,3,5,8],[2,1,14,7,4,10,8,13,15,12,9,0,3,5,6,11]]
		];

		const hud = document.getElementById("hud");
		const hudTitle = document.getElementById("hudTitle");
		const hudText = document.getElementById("hudText");
		const entry = document.getElementById("entry");
		const split = document.getElementById("split");
		const plaintextInput = document.getElementById("plaintext");
		const keyInput = document.getElementById("keytext");
		const mobileBlock = document.getElementById("mobileBlock");
		const isMobileOrTablet = /Android|iPhone|iPad|iPod|Mobile|Tablet/i.test(navigator.userAgent)
			|| (window.matchMedia("(max-width: 1024px) and (pointer: coarse)").matches);
		const skipRoundBtn = document.createElement("button");
		skipRoundBtn.type = "button";
		skipRoundBtn.textContent = "Fast Forward\nTo The End Of Round 16";
		skipRoundBtn.style.position = "fixed";
		skipRoundBtn.style.right = "18px";
		skipRoundBtn.style.bottom = "18px";
		skipRoundBtn.style.zIndex = "7";
		skipRoundBtn.style.minHeight = "42px";
		skipRoundBtn.style.padding = "6px 16px";
		skipRoundBtn.style.border = "0";
		skipRoundBtn.style.borderRadius = "11px";
		skipRoundBtn.style.color = "rgba(255, 255, 255, 0.96)";
		skipRoundBtn.style.fontWeight = "700";
		skipRoundBtn.style.fontSize = "0.92rem";
		skipRoundBtn.style.lineHeight = "1.1";
		skipRoundBtn.style.whiteSpace = "pre-line";
		skipRoundBtn.style.textAlign = "center";
		skipRoundBtn.style.cursor = "pointer";
		skipRoundBtn.style.opacity = "0";
		skipRoundBtn.style.pointerEvents = "none";
		skipRoundBtn.style.transition = "background 0.24s ease, box-shadow 0.24s ease, transform 0.24s ease";
		skipRoundBtn.style.transform = "translateY(0px)";
		skipRoundBtn.style.display = "none";
		document.body.appendChild(skipRoundBtn);

		if (isMobileOrTablet) {
			mobileBlock.style.display = "grid";
			entry.style.display = "none";
			hud.style.display = "none";
			skipRoundBtn.style.display = "none";
		}

		const scene = new THREE.Scene();
		const camera = new THREE.PerspectiveCamera(46, window.innerWidth / window.innerHeight, 0.1, 260);
		camera.position.set(-1.5, 8.4, 18);
		scene.add(camera);
		const cameraTarget = new THREE.Vector3(0, 0, 0);

		const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
		renderer.setPixelRatio(Math.min(2, window.devicePixelRatio));
		renderer.setSize(window.innerWidth, window.innerHeight);
		document.getElementById("app").appendChild(renderer.domElement);

		const amb = new THREE.AmbientLight(0xffffff, 0.92);
		const hemi = new THREE.HemisphereLight(0xf8fbff, 0xdce6f1, 0.56);
		const dir = new THREE.DirectionalLight(0xffffff, 0.85);
		dir.position.set(8, 11, 10);
		scene.add(amb, hemi, dir);

		const FLOOR_BASE_WIDTH = 80;
		const FLOOR_BASE_DEPTH = 80;
		const floor = new THREE.Mesh(
			new THREE.PlaneGeometry(FLOOR_BASE_WIDTH, FLOOR_BASE_DEPTH),
			new THREE.MeshStandardMaterial({ color: 0xecf2f8, roughness: 0.95, metalness: 0.02 })
		);
		floor.rotation.x = -Math.PI / 2;
		floor.position.y = -3;
		scene.add(floor);

		const bitGeo = new THREE.BoxGeometry(0.34, 0.34, 0.16);
		const boardGeo = new THREE.BoxGeometry(0.9, 0.12, 0.42);
		const lineMat = new THREE.MeshStandardMaterial({ color: 0xb9cada, roughness: 0.72, metalness: 0.08 });

		function stage(title, text) {
			hudTitle.textContent = activeStageRoundPrefix && !String(title).startsWith("Round ")
				? `${activeStageRoundPrefix} ${title}`
				: title;
			hudText.textContent = text;
			hud.classList.add("show");
		}

		const STAGE_DELAY_MS = 220;
		const TABLE_TOWARD_CAMERA = 1.3;
		const TABLE_SCALE = 1.1;
		const SHIFT_SCHEDULE = [1, 1, 2, 2, 2, 2, 2, 2, 1, 2, 2, 2, 2, 2, 2, 1];
		let ANIMATION_SPEED = 1;
		let BASE_ANIMATION_SPEED = 1;
		let ROUND_SPEED_FACTOR = 1;
		let activeStageRoundPrefix = "";
		const CHAR_BITS_SPEED_MAX_FACTOR = 3;
		const SBOX_SPEED_FACTORS = [1, 1, 1, 2.8, 4.0, 5.2, 6.4, 7.6];
		const TURBO_ROUND_SPEED_FACTOR = 1000;
		let turboToRound16Requested = false;

		function setSkipRoundButtonFilled(isFilled) {
			if (isFilled) {
				skipRoundBtn.style.background = "linear-gradient(115deg, rgba(38, 117, 216, 0.95), rgba(59, 145, 255, 0.98))";
				skipRoundBtn.style.boxShadow = "0 10px 22px rgba(47, 128, 237, 0.28)";
				return;
			}
			skipRoundBtn.style.background = "linear-gradient(115deg, rgba(38, 117, 216, 0), rgba(59, 145, 255, 0))";
			skipRoundBtn.style.boxShadow = "0 10px 22px rgba(47, 128, 237, 0)";
		}

		function setTurboSkipRequested() {
			turboToRound16Requested = true;
			skipRoundBtn.textContent = "Fast Forwarding";
			skipRoundBtn.style.pointerEvents = "none";
			skipRoundBtn.style.transform = "translateY(-1px)";
			setSkipRoundButtonFilled(true);
			setRoundSpeedFactor(TURBO_ROUND_SPEED_FACTOR);
			gsap.to(skipRoundBtn, {
				opacity: 0,
				duration: 0.22,
				ease: "power2.out",
				onComplete: () => {
					skipRoundBtn.style.display = "none";
				}
			});
		}

		function clampSpeed(value) {
			if (!Number.isFinite(value)) return 1;
			return Math.min(2000, Math.max(0.25, value));
		}

		function applyAnimationSpeed(multiplier) {
			ANIMATION_SPEED = clampSpeed(multiplier);
			BASE_ANIMATION_SPEED = ANIMATION_SPEED;
			ROUND_SPEED_FACTOR = 1;
			gsap.globalTimeline.timeScale(ANIMATION_SPEED);
		}

		function setRoundSpeedFactor(factor = 1) {
			ROUND_SPEED_FACTOR = Math.max(0.25, factor);
			resetSectionSpeed();
		}

		function setSectionSpeedFactor(factor = 1) {
			ANIMATION_SPEED = clampSpeed(BASE_ANIMATION_SPEED * ROUND_SPEED_FACTOR * factor);
			gsap.globalTimeline.timeScale(ANIMATION_SPEED);
		}

		function resetSectionSpeed() {
			ANIMATION_SPEED = clampSpeed(BASE_ANIMATION_SPEED * ROUND_SPEED_FACTOR);
			gsap.globalTimeline.timeScale(ANIMATION_SPEED);
		}

		function wait(ms) {
			return new Promise(resolve => setTimeout(resolve, ms / ANIMATION_SPEED));
		}

		function animateFloorBounds(minX, maxX, depth = 140, duration = 0.42) {
			const width = Math.max(20, maxX - minX);
			const centerX = (minX + maxX) / 2;
			const targetScaleX = width / FLOOR_BASE_WIDTH;
			const targetScaleZ = depth / FLOOR_BASE_DEPTH;

			gsap.killTweensOf(floor.scale);
			gsap.killTweensOf(floor.position);
			gsap.to(floor.scale, {
				x: targetScaleX,
				z: targetScaleZ,
				duration: Math.min(0.18, duration),
				ease: "power2.out"
			});
			gsap.to(floor.position, {
				x: centerX,
				duration: Math.min(0.18, duration),
				ease: "power2.out"
			});
		}

		function roundStageTitle(round, title) {
			return round === 1 ? title : `Round ${round}/16: ${title}`;
		}

		function updateFloorForCharacterSpan(plainLength, keyLength, phase = "plaintext-intro") {
			const spacing = 3.4;
			const leftStartX = SHARED_ROW_AXIS.charLeftCenter;
			const rightStartX = SHARED_ROW_AXIS.charLeftCenter + (7 * spacing) + SHARED_ROW_AXIS.charGap;
			const safePlainLen = Math.max(1, plainLength);
			const safeKeyLen = Math.max(1, keyLength);
			const introPhase = phase === "plaintext-intro";
			const effectivePlainLen = introPhase ? safePlainLen : Math.min(8, safePlainLen);

			const leftEndX = leftStartX + ((effectivePlainLen - 1) * spacing);
			const rightEndX = rightStartX + ((safeKeyLen - 1) * spacing);
			const leftPadding = introPhase ? 32 : 10;
			const rightPadding = introPhase ? 22 : 10;
			const minX = Math.min(leftStartX, rightStartX) - leftPadding;
			const maxX = Math.max(leftEndX, rightEndX) + rightPadding;

			animateFloorBounds(minX, maxX, 140, 0.48);
		}

		function updateFloorForBitRows(leftTokens, rightTokens) {
			if (!leftTokens || !rightTokens || leftTokens.length === 0 || rightTokens.length === 0) return;
			const leftXs = leftTokens.map(t => (t && t.mesh && t.mesh.position) ? t.mesh.position.x : (t && typeof t.x === "number" ? t.x : null)).filter(x => Number.isFinite(x));
			const rightXs = rightTokens.map(t => (t && t.mesh && t.mesh.position) ? t.mesh.position.x : (t && typeof t.x === "number" ? t.x : null)).filter(x => Number.isFinite(x));
			if (leftXs.length === 0 || rightXs.length === 0) return;

			const minX = Math.min(...leftXs);
			const maxX = Math.max(...rightXs);
			const padding = 30;
			animateFloorBounds(minX - padding, maxX + padding, 140, 0.52);
		}

		function asciiRows() {
			const rows = [];
			for (let i = 32; i <= 126; i += 1) {
				const ch = String.fromCharCode(i);
				const bits = i.toString(2).padStart(8, "0");
				rows.push({ code: i, ch, bits });
			}

		function textToBits(text) {

		function sboxSubstitution(bits48) {
			const out = [];
			for (let i = 0; i < 8; i += 1) {
				const b = i * 6;
				const row = (bits48[b] << 1) | bits48[b + 5];
				const col = (bits48[b + 1] << 3) | (bits48[b + 2] << 2) | (bits48[b + 3] << 1) | bits48[b + 4];
				const val = SBOX[i][row][col];
				out.push((val >> 3) & 1, (val >> 2) & 1, (val >> 1) & 1, val & 1);
			}
			return out;
		}

			const key56 = permuteBits(keyBits64, PC1);
			let c = key56.slice(0, 28);
			let d = key56.slice(28);
			const roundKeys = [];
			for (let i = 0; i < 16; i += 1) {
				const shift = SHIFT_SCHEDULE[i];
				c = rotateLeft(c, shift);
				d = rotateLeft(d, shift);
				roundKeys.push(permuteBits(c.concat(d), PC2));
			}
			return roundKeys;
		}

		function computeDesRoundStateAfter16(plainBits64, keyBits64) {
			const ipBits = permuteBits(plainBits64, IP);
			let l = ipBits.slice(0, 32);
			let r = ipBits.slice(32);
			const roundKeys = deriveRoundKeys(keyBits64);

			for (let i = 0; i < 16; i += 1) {
				const expanded = permuteBits(r, E);
				const mixed = xorBitArrays(expanded, roundKeys[i]);
				const sboxed = sboxSubstitution(mixed);
				const pOut = permuteBits(sboxed, P);
				const nextR = xorBitArrays(l, pOut);
				l = r;
				r = nextR;
			}

			return { left: l, right: r };
		}

		async function fitCameraToTokens(tokens, options = {}) {
			if (!tokens || tokens.length === 0) return;
			const {
				padding = 1.16,
				duration = 1.05,
				minDistance = 12,
				extraDistance = 2.4
			} = options;

			const points = [];
			tokens.forEach(token => {
				if (!token || !token.mesh) return;
				const p = new THREE.Vector3();
				token.mesh.getWorldPosition(p);
				points.push(p);
			});
			if (points.length === 0) return;

			const bounds = new THREE.Box3().setFromPoints(points);
			const center = bounds.getCenter(new THREE.Vector3());
			const size = bounds.getSize(new THREE.Vector3());

			const halfWidth = Math.max(0.8, (size.x * padding) / 2);
			const halfHeight = Math.max(0.9, (size.y * padding) / 2);
			const vFov = THREE.MathUtils.degToRad(camera.fov);
			const hFov = 2 * Math.atan(Math.tan(vFov / 2) * camera.aspect);

			const distForWidth = halfWidth / Math.tan(hFov / 2);
			const distForHeight = halfHeight / Math.tan(vFov / 2);
			const dist = Math.max(minDistance, distForWidth, distForHeight) + (size.z * 0.65) + extraDistance;

			const pos = new THREE.Vector3(
				center.x,
				center.y + Math.max(4.8, dist * 0.52),
				center.z + dist
			);
			const target = new THREE.Vector3(center.x, center.y - 0.1, center.z);

			await moveCamera(pos, target, duration);
		}

				const bitDelayFactor = i < 3 ? 1 : Math.max(0.08, 1 - (0.92 * charRampProgress));
				const settleDelayFactor = i < 3 ? 1 : Math.max(0.12, 1 - (0.88 * charRampProgress));
				setSectionSpeedFactor(charSpeedFactor);
				if (i === 0 && side === "right") {
					updateFloorForCharacterSpan(8, chars.length, "key-intro");
				}
				await new Promise(resolve => gsap.to(charTrack.position, {
					x: centerOffset - i * spacing,
					duration: 0.3,
					ease: "power2.inOut",
					onComplete: resolve
				}));

				const charWorld = new THREE.Vector3();
				panels[i].getWorldPosition(charWorld);
				await moveCamera(
					new THREE.Vector3(charWorld.x, 5.4, charWorld.z + 5.8),
					new THREE.Vector3(charWorld.x, charWorld.y - 0.2, charWorld.z),
					0.9
				);

				if (i === 0 && !table) {
					table = makeAsciiTable("right", true);
					await wait(120);
				}

				const code = chars[i].charCodeAt(0) & 0xff;
				await focusAsciiRow(table, code);
				const bitRowY = charWorld.y - 2.35;
				const bitRowZ = charWorld.z + 0.35;

				for (let b = 7; b >= 0; b -= 1) {
					const bit = (code >> b) & 1;
					const panelLocal = panels[i].position.clone();
					const spawn = new THREE.Vector3(panelLocal.x, panelLocal.y - 0.85, panelLocal.z + 0.1);
					const tok = makeBit(bit, spawn, kind, charTrack);
					produced.push(tok);
					const localIdx = 7 - b;
					const underTarget = new THREE.Vector3(panelLocal.x - 1.45 + localIdx * 0.42, panelLocal.y - 2.35, panelLocal.z + 0.35);

					if (bitIdx < 64) {
						first64.push(tok);
						animateTokenTo(tok, underTarget, 0.34, (0.016 * (7 - b)) * bitDelayFactor, 0.4);
					} else {
						overflow.push(tok);
						animateTokenTo(tok, underTarget, 0.34, (0.016 * (7 - b)) * bitDelayFactor, 0.4);
					}
					bitIdx += 1;
				}
				// Do not pan to the next character until the current bit-drop animation is fully settled.
				await wait((bitAnimDurationMs + bitAnimMaxDelayMs + 40) * settleDelayFactor);

			}

			resetSectionSpeed();
			await wait(480);
			freezeTokensToWorld(produced);
			panels.forEach((p, i) => {
				gsap.to(p.position, { y: 2.4, duration: 0.3, delay: i * 0.02 });
				gsap.to(p.material, {
					opacity: 0,
					duration: 0.3,
					delay: i * 0.02,
					onComplete: () => removeObject(p)
				});
			});
			await wait(340);
			removeObject(table.group);
			removeObject(charTrack);

			return { produced, first64, overflow };
		}

		async function arrangeFirst64Row(tokens64, side = "left", animate = true) {

		async function splitIntoHalves(tokens64, side = "left", title = "Split", anchor = {}) {
			if (!tokens64 || tokens64.length < 2 || (tokens64.length % 2) !== 0) return { left: [], right: [] };
			const halfCount = tokens64.length / 2;
			const step = SHARED_ROW_AXIS.bitSpacing;
			const splitGap = SHARED_ROW_AXIS.halfSplitGap;
			const currentXs = tokens64.map(t => t.mesh.position.x);
			const centerX = (Math.min(...currentXs) + Math.max(...currentXs)) / 2;
			const rowY = Number.isFinite(anchor.rowY) ? anchor.rowY : SHARED_ROW_AXIS.bitY;
			const rowZ = Number.isFinite(anchor.rowZ) ? anchor.rowZ : SHARED_ROW_AXIS.bitZ;

			let leftStart = centerX - ((halfCount - 1) * step) - (splitGap / 2);
			let rightStart = centerX + (splitGap / 2);
			let spanStart = leftStart;
			let spanEnd = rightStart + ((halfCount - 1) * step);

			if (side === "left" && rowBounds.right) {
				const maxEnd = rowBounds.right.start - SHARED_ROW_AXIS.bitGap;
				if (spanEnd > maxEnd) {
					const shift = spanEnd - maxEnd;
					leftStart -= shift;
					rightStart -= shift;
					spanStart -= shift;
					spanEnd -= shift;
				}
			}
			if (side === "right" && rowBounds.left) {
				const minStart = rowBounds.left.end + SHARED_ROW_AXIS.bitGap;
				if (spanStart < minStart) {
					const shift = minStart - spanStart;
					leftStart += shift;
					rightStart += shift;
					spanStart += shift;
					spanEnd += shift;
				}
			}

			if (side === "left") rowBounds.left = { start: spanStart, end: spanEnd };
			else rowBounds.right = { start: spanStart, end: spanEnd };

			const leftTargets = layoutLine(halfCount, leftStart, rowY, rowZ, step);
			const rightTargets = layoutLine(halfCount, rightStart, rowY, rowZ, step);

			stage(title, "Split the block into L and R halves.");
			await wait(STAGE_DELAY_MS);
			for (let i = 0; i < halfCount; i += 1) {
				animateTokenTo(tokens64[i], leftTargets[i], 0.24, 0, 0.2);
				await wait(20);
			}
			for (let i = 0; i < halfCount; i += 1) {
				animateTokenTo(tokens64[halfCount + i], rightTargets[i], 0.24, 0, 0.2);
				await wait(20);
			}
			await wait(460);
			return {
				left: tokens64.slice(0, halfCount),
				right: tokens64.slice(halfCount)
			};
		}

				out[i] = token;
				animateTokenTo(token, slots[i], 0.28, 0, 0.28);

		async function keyShiftAndContract(key64, roundIndex = 1) {
			stage("Key Schedule", "Split the key halves and apply the round shift.");
			await wait(STAGE_DELAY_MS);
			await fitCameraToTokens(key64, {
				padding: 1.12,
				duration: 0.8,
				minDistance: 11.2,
				extraDistance: 2.0
			});

			const keyBounds = tokenBounds(key64);
			const keyCenter = keyBounds ? keyBounds.getCenter(new THREE.Vector3()) : null;
			const keyRowY = keyCenter ? keyCenter.y : SHARED_ROW_AXIS.bitY;
			const keyRowZ = keyCenter ? keyCenter.z : SHARED_ROW_AXIS.bitZ;
			const halves = await splitIntoHalves(key64, "right", "Split to C / D", {
				rowY: keyRowY,
				rowZ: keyRowZ
			});
			await fitCameraToTokens(halves.left.concat(halves.right), {
				padding: 1.14,
				duration: 0.75,
				minDistance: 11.4,
				extraDistance: 2.1
			});

			const shift = SHIFT_SCHEDULE[Math.max(0, Math.min(15, roundIndex - 1))];
			const shiftDirection = "left";
			const nextLeft = shiftDirection === "left" ? rotateLeft(key64.slice(0, 28), shift) : rotateRight(key64.slice(0, 28), shift);
			const nextRight = shiftDirection === "left" ? rotateLeft(key64.slice(28), shift) : rotateRight(key64.slice(28), shift);
			const nextKey56 = nextLeft.concat(nextRight);

			const leftBounds = tokenBounds(halves.left);
			const rightBounds = tokenBounds(halves.right);
			const leftCenter = leftBounds ? leftBounds.getCenter(new THREE.Vector3()) : null;
			const rightCenter = rightBounds ? rightBounds.getCenter(new THREE.Vector3()) : null;
			const step = SHARED_ROW_AXIS.bitSpacing;
			const leftStart = leftBounds ? leftBounds.min.x : 0;
			const rightStart = rightBounds ? rightBounds.min.x : (leftStart + (31 * step) + SHARED_ROW_AXIS.halfSplitGap);
			const rowY = ((leftCenter ? leftCenter.y : workingRowY) + (rightCenter ? rightCenter.y : workingRowY)) / 2;
			const rowZ = ((leftCenter ? leftCenter.z : workingRowZ) + (rightCenter ? rightCenter.z : workingRowZ)) / 2;

			const c = shiftDirection === "left" ? rotateLeft(halves.left, shift) : rotateRight(halves.left, shift);
			const d = shiftDirection === "left" ? rotateLeft(halves.right, shift) : rotateRight(halves.right, shift);
			const halfCount = halves.left.length;
			const cTargets = layoutLine(halfCount, leftStart, rowY, rowZ, step);
			const dTargets = layoutLine(halfCount, rightStart, rowY, rowZ, step);
			c.forEach((t, i) => animateTokenTo(t, cTargets[i], 0.3, i * 0.003, 0.2));
			d.forEach((t, i) => animateTokenTo(t, dTargets[i], 0.3, i * 0.003, 0.2));
			await wait(760);
			await fitCameraToTokens(c.concat(d), {
				padding: 1.14,
				duration: 0.7,
				minDistance: 11.2,
				extraDistance: 2.0
			});

			rowBounds.right = {
				start: Math.min(cTargets[0].x, dTargets[0].x),
				end: Math.max(cTargets[cTargets.length - 1].x, dTargets[dTargets.length - 1].x)
			};

			stage("Permuted Choice 2", "Select the 48-bit round subkey.");
			await wait(STAGE_DELAY_MS);
			const merged = c.concat(d);
			const workingKey = [];
			for (let i = 0; i < merged.length; i += 1) {
				const src = tokenWorldPoint(merged[i]);
				const clone = cloneBitToken(merged[i], "key");
				clone.mesh.position.copy(src);
				clone.mesh.scale.set(0.001, 0.001, 0.001);
				workingKey.push(clone);
				gsap.to(clone.mesh.scale, {
					x: 1,
					y: 1,
					z: 1,
					duration: 0.44,
					ease: "back.out(1.6)"
				});
				animateTokenTo(clone, new THREE.Vector3(src.x, src.y - 0.82, src.z + 0.3), 0.82, 0, 0.42);
				gsap.to(merged[i].mesh.scale, {
					x: 1.16,
					y: 1.16,
					z: 1.16,
					duration: 0.32,
					yoyo: true,
					repeat: 1,
					ease: "power1.inOut"
				});
			}
			await wait(980);

			stage("Permuted Choice 2", "Select the 48-bit round subkey.");
			await wait(STAGE_DELAY_MS);
			const key48 = await showContractionPermutation(workingKey, "right");

			await wait(220);
			return { key48, nextKey56 };
		}

		async function xorOverlay(data48, key48) {
			stage("XOR", "Combine the data and subkey bits.");
			await wait(STAGE_DELAY_MS);

			const allTokens = data48.concat(key48);
			const combinedBounds = tokenBounds(allTokens);
			const centerZ = combinedBounds ? combinedBounds.max.z + 0.7 : 2.6;

			await fitCameraToTokens(allTokens, {
				padding: 1.18,
				duration: 0.92,
				minDistance: 14.6,
				extraDistance: 3.2
			});
			await moveCamera(
				new THREE.Vector3(0, 8.8, centerZ + 20.4),
				new THREE.Vector3(0, -0.15, centerZ),
				0.95
			);

			const rowSpacing = 0.38;
			const rowStartX = -((48 - 1) * rowSpacing) / 2;
			const xorRowZ = centerZ + 5.6;
			const plaintextTargets = layoutLine(48, rowStartX, 0.86, xorRowZ, rowSpacing);
			const keyTargets = layoutLine(48, rowStartX, -0.86, xorRowZ, rowSpacing);
			const collisionY = -0.78;
			const resultTargets = layoutLine(48, rowStartX, collisionY, xorRowZ, rowSpacing);

			for (let i = 0; i < 48; i += 1) {
				animateTokenTo(data48[i], plaintextTargets[i], 0.34, 0, 0.18);
				animateTokenTo(key48[i], keyTargets[i], 0.34, 0, 0.18);
				await wait(24);
			}

			await wait(360);

			const collisionTweens = data48.map((token, i) => new Promise(resolve => {
				gsap.to(token.mesh.position, {
					y: collisionY,
					duration: 0.96,
					ease: "power2.inOut",
					onComplete: resolve
				});
				gsap.to(token.mesh.scale, {
					x: 1.05,
					y: 1.05,
					z: 1.05,
					duration: 0.96,
					ease: "power2.inOut"
				});
				gsap.to(key48[i].mesh.scale, {
					x: 1.08,
					y: 1.08,
					z: 1.08,
					duration: 0.96,
					yoyo: true,
					repeat: 1,
					ease: "power1.inOut"
				});
			}));

			await Promise.all(collisionTweens);

			const xorValues = data48.map((token, i) => token.bit ^ key48[i].bit);
			const resultTokens = [];

			xorValues.forEach((bit, i) => {
				const resultSpawn = resultTargets[i].clone();
				resultSpawn.y -= 0.34;
				const result = makeBit(bit, resultSpawn, "xor");
				result.mesh.scale.set(0.001, 0.001, 0.001);
				resultTokens.push(result);
				gsap.to(result.mesh.scale, { x: 1, y: 1, z: 1, duration: 0.22, ease: "back.out(2.4)" });
				glowBitToken(result, bit, bit ? 0.54 : 0.24);
				animateTokenTo(result, resultTargets[i], 0.28, 0, 0.52);
				gsap.to(result.mesh.position, {
					y: resultTargets[i].y + 0.6,
					duration: 0.14,
					delay: 0.05,
					yoyo: true,
					repeat: 1,
					ease: "power1.out"
				});
				data48[i].mesh.material.transparent = true;
				key48[i].mesh.material.transparent = true;
				gsap.to(data48[i].mesh.scale, { x: 0.001, y: 0.001, z: 0.001, duration: 0.28, ease: "power2.in", delay: 0.02 });
				gsap.to(key48[i].mesh.scale, { x: 0.001, y: 0.001, z: 0.001, duration: 0.28, ease: "power2.in", delay: 0.02 });
				gsap.to(data48[i].mesh.material, { opacity: 0, duration: 0.24, delay: 0.03, onComplete: () => removeObject(data48[i].mesh) });
				gsap.to(key48[i].mesh.material, { opacity: 0, duration: 0.24, delay: 0.03, onComplete: () => removeObject(key48[i].mesh) });
			});

			await wait(620);
			return resultTokens;
		}

		function bitsFromTokens(tokens) {
			return tokens.map(t => t.bit);
		}

		function glowBitToken(token, bit, intensity = 0.42) {
			const color = new THREE.Color(bit ? 0x2f80ed : 0xe8edf3);
			const emissive = new THREE.Color(bit ? 0x144487 : 0x64788f);
			gsap.to(token.mesh.material.color, {
				r: color.r,
				g: color.g,
				b: color.b,
				duration: 0.24,
				ease: "power2.out"
			});
			gsap.to(token.mesh.material.emissive, {
				r: emissive.r,
				g: emissive.g,
				b: emissive.b,
				duration: 0.24,
				ease: "power2.out"
			});
			gsap.to(token.mesh.material, {
				emissiveIntensity: intensity,
				duration: 0.24,
				ease: "power2.out"
			});
		}

		function sboxTransform(bits48) {
			const out = [];
			for (let i = 0; i < 8; i += 1) {
				const b = i * 6;
				const row = (bits48[b] << 1) | bits48[b + 5];
				const col = (bits48[b + 1] << 3) | (bits48[b + 2] << 2) | (bits48[b + 3] << 1) | bits48[b + 4];
				const val = SBOX[i][row][col];
				out.push((val >> 3) & 1, (val >> 2) & 1, (val >> 1) & 1, val & 1);
			}
			return out;
		}

		async function sboxJourney(tokens48) {
			setSectionSpeedFactor(1);
			stage("S-Boxes", "Map each 6-bit group to 4 bits.");

			const inputBits = bitsFromTokens(tokens48);
			const outBits = sboxTransform(inputBits);
			const outputs = [];
			const inputBounds = tokenBounds(tokens48);
			const inputCenter = inputBounds ? inputBounds.getCenter(new THREE.Vector3()) : new THREE.Vector3(0, -0.04, 3.4);
			const baseInputY = inputCenter.y;
			const baseInputZ = inputCenter.z;
			const inputBitSpacing = 0.34;
			const inputGroupGap = 0.92;
			const groupedInputTargets = [];
			const groupCentersX = [];

			let groupedStartX = -(((48 - 1) * inputBitSpacing) + (7 * inputGroupGap)) / 2;
			for (let g = 0; g < 8; g += 1) {
				for (let j = 0; j < 6; j += 1) {
					groupedInputTargets.push(new THREE.Vector3(groupedStartX, baseInputY, baseInputZ));
					groupedStartX += inputBitSpacing;
				}
				groupCentersX.push(groupedInputTargets[(g * 6) + 2].x + (inputBitSpacing * 0.5));
				if (g < 7) groupedStartX += inputGroupGap;
			}

			await fitCameraToTokens(tokens48, {
				padding: 1.14,
				duration: 0.72,
				minDistance: 11.2,
				extraDistance: 2.0
			});
			await moveCamera(
				new THREE.Vector3(inputCenter.x, 8.6, baseInputZ + 12.7),
				new THREE.Vector3(inputCenter.x, baseInputY - 0.16, baseInputZ),
				0.72
			);

			stage("S-Boxes", "Split the 48 bits into 8 groups of 6.");
			for (let i = 0; i < tokens48.length; i += 1) {
				animateTokenTo(tokens48[i], groupedInputTargets[i], 0.32, i * 0.002, 0.16);
			}
			await wait(620);

			const tableY = baseInputY - 1.95;
			const tableZ = baseInputZ;
			const outputY = tableY;
			const outputZ = tableZ + 2.65;
			const tableCenters = groupCentersX.map(x => new THREE.Vector3(x, tableY, tableZ));
			const groupedOutputTargets = [];
			for (let g = 0; g < 8; g += 1) {
				groupedOutputTargets.push(layoutLine(4, tableCenters[g].x - 0.51, outputY, outputZ, 0.34));
			}

			for (let s = 0; s < 8; s += 1) {
				const sboxSpeedFactor = SBOX_SPEED_FACTORS[s] ?? SBOX_SPEED_FACTORS[SBOX_SPEED_FACTORS.length - 1];
				setSectionSpeedFactor(sboxSpeedFactor);
				const tableCenter = tableCenters[s];
				const tableGroup = new THREE.Group();
				tableGroup.userData.dynamic = true;
				tableGroup.position.copy(tableCenter);
				scene.add(tableGroup);

				await moveCamera(
					new THREE.Vector3(tableCenter.x, 8.9, tableCenter.z + 2.2),
					new THREE.Vector3(tableCenter.x, tableCenter.y - 0.28, tableCenter.z),
					0.66
				);

				const plateMat = new THREE.MeshStandardMaterial({ color: 0xe9f1fa, roughness: 0.82, metalness: 0.04, transparent: true, opacity: 0 });
				const plate = new THREE.Mesh(new THREE.BoxGeometry(6.4, 0.08, 3.6), plateMat);
				plate.position.set(0, -0.12, 0);
				tableGroup.add(plate);

				const rimMat = new THREE.MeshStandardMaterial({ color: 0xd4e2f0, roughness: 0.74, metalness: 0.04, transparent: true, opacity: 0 });
				const rim = new THREE.Mesh(new THREE.BoxGeometry(6.58, 0.12, 3.78), rimMat);
				rim.position.set(0, -0.16, 0);
				tableGroup.add(rim);

				const tableLegMat = new THREE.MeshStandardMaterial({ color: 0x9ab2cb, roughness: 0.8, metalness: 0.03, transparent: true, opacity: 0 });
				const tableLegs = [];
				[
					[-2.95, -0.54, -1.65],
					[2.95, -0.54, -1.65],
					[-2.95, -0.54, 1.65],
					[2.95, -0.54, 1.65]
				].forEach(([x, y, z]) => {
					const leg = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.72, 0.16), tableLegMat);

					tableGroup.add(leg);
					tableLegs.push(leg);

				const title = textSprite(`S${s + 1}`, 220, 80, "700 42px Menlo", "#2f4e6f", 0.92, 0.34);
				title.position.set(0, 1.18, 0.18);
				tableGroup.add(title);

				const cellPositions = layoutGrid(64, 16, 0, 0.22, 0.0, 0.28, 0.28);
				const cellMeshes = [];
				const cellSprites = [];
				for (let row = 0; row < 4; row += 1) {
					for (let col = 0; col < 16; col += 1) {
						const value = SBOX[s][row][col];
						const cellIndex = row * 16 + col;
						const cellMat = new THREE.MeshStandardMaterial({ color: 0xf7fbff, roughness: 0.74, metalness: 0.03, transparent: true, opacity: 0 });
						const cell = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.05, 0.22), cellMat);
						cell.position.copy(cellPositions[cellIndex]);
						cell.position.z -= 0.18;
						tableGroup.add(cell);
						const valueLabel = textSprite(String(value), 90, 56, "700 28px Menlo", "#355c85", 0.16, 0.12);
						valueLabel.position.copy(cell.position).add(new THREE.Vector3(0, 0.12, 0.01));
						tableGroup.add(valueLabel);
						cellMeshes.push(cell);
						cellSprites.push(valueLabel);
					}
				}

				const rowLabels = [];
				for (let row = 0; row < 4; row += 1) {
					const label = textSprite(String(row), 90, 56, "700 24px Menlo", "#355c85", 0.16, 0.12);
					label.position.copy(layoutLine(4, -2.18, 0.22, 0.18, 0.28)[row]);
					tableGroup.add(label);
					rowLabels.push(label);
				}

				const inStart = s * 6;
				const outStart = s * 4;
				const entering = tokens48.slice(inStart, inStart + 6);
				const row = (inputBits[inStart] << 1) | inputBits[inStart + 5];
				const col = (inputBits[inStart + 1] << 3) | (inputBits[inStart + 2] << 2) | (inputBits[inStart + 3] << 1) | inputBits[inStart + 4];
				const tokenHalfHeight = 0.17;
				const tableTopY = tableCenter.y - 0.12;
				const tokenBaseY = tableTopY + tokenHalfHeight + 0.02;

				const incomingY = tokenBaseY + 1.18;
				const inputSlots = layoutLine(6, tableCenter.x - 0.7, incomingY, tableCenter.z + 0.08, 0.3);

				const bitBoxWidth = 0.26;
				const bitBoxGap = 0.02;
				const bitStep = bitBoxWidth + bitBoxGap;

				const rowBitY = tokenBaseY + 0.18;
				const gridLeftEdgeX = tableCenter.x + cellPositions[0].x - (0.26 / 2);
				const rowRightCenterX = gridLeftEdgeX - (bitBoxWidth / 2) - 0.01;
				const rowLeftCenterX = rowRightCenterX - bitStep;
				const rowBitPositions = [
					new THREE.Vector3(rowLeftCenterX, rowBitY, tableCenter.z + cellPositions[row * 16].z),
					new THREE.Vector3(rowRightCenterX, rowBitY, tableCenter.z + cellPositions[row * 16].z)
				];

				const colBitY = tokenBaseY + 0.54;
				const colCenterX = tableCenter.x + cellPositions[col].x;
				const colStartX = colCenterX - ((((4 * bitBoxWidth) + (3 * bitBoxGap)) / 2) - (bitBoxWidth / 2));
				const colBitPositions = [
					new THREE.Vector3(colStartX + (0 * bitStep), colBitY, tableCenter.z + cellPositions[col].z),
					new THREE.Vector3(colStartX + (1 * bitStep), colBitY, tableCenter.z + cellPositions[col].z),
					new THREE.Vector3(colStartX + (2 * bitStep), colBitY, tableCenter.z + cellPositions[col].z),
					new THREE.Vector3(colStartX + (3 * bitStep), colBitY, tableCenter.z + cellPositions[col].z)
				];

				const fullStackMidY = (incomingY + outputY) / 2;
				await moveCamera(
					new THREE.Vector3(tableCenter.x, fullStackMidY + 5.9, tableCenter.z + 5.8),
					new THREE.Vector3(tableCenter.x, fullStackMidY - 0.05, tableCenter.z + 0.02),
					0.42
				);

				const inputSlotMats = [];
				const inputSlotMeshes = [];
				inputSlots.forEach(p => {
					const mat = new THREE.MeshStandardMaterial({ color: 0xd7e6f7, roughness: 0.84, metalness: 0.02, transparent: true, opacity: 0 });
					const slot = new THREE.Mesh(new THREE.BoxGeometry(0.27, 0.03, 0.2), mat);
					slot.position.copy(p).add(new THREE.Vector3(0, -0.18, 0));
					tableGroup.add(slot);
					inputSlotMats.push(mat);
					inputSlotMeshes.push(slot);
				});

				const rowIndicatorMats = [];
				const rowIndicatorMeshes = [];
				rowBitPositions.forEach(p => {
					const mat = new THREE.MeshStandardMaterial({ color: 0xd9e8f8, roughness: 0.84, metalness: 0.02, transparent: true, opacity: 0 });
					const slot = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.04, 0.22), mat);
					slot.position.copy(p).add(new THREE.Vector3(0, -0.08, 0));
					tableGroup.add(slot);
					rowIndicatorMeshes.push(slot);
					rowIndicatorMats.push(mat);
				});

				const colIndicatorMats = [];
				const colIndicatorMeshes = [];
				colBitPositions.forEach(p => {
					const mat = new THREE.MeshStandardMaterial({ color: 0xd7e6f7, roughness: 0.84, metalness: 0.02, transparent: true, opacity: 0 });
					const slot = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.04, 0.22), mat);
					slot.position.copy(p).add(new THREE.Vector3(0, -0.08, 0));
					tableGroup.add(slot);
					colIndicatorMeshes.push(slot);
					colIndicatorMats.push(mat);
				});

				await new Promise(resolve => gsap.to(plateMat, { opacity: 1, duration: 0.22, ease: "power2.out", onComplete: resolve }));
				gsap.to(rimMat, { opacity: 1, duration: 0.18, ease: "power2.out" });
				gsap.to(tableLegMat, { opacity: 1, duration: 0.22, ease: "power2.out" });
				gsap.to(title.material, { opacity: 1, duration: 0.16, ease: "power2.out" });
				inputSlotMats.forEach((mat, i) => gsap.to(mat, { opacity: 0.92, duration: 0.12, delay: i * 0.02 }));
				rowIndicatorMats.forEach((mat, i) => gsap.to(mat, { opacity: 0.92, duration: 0.1, delay: i * 0.02 }));
				colIndicatorMats.forEach((mat, i) => gsap.to(mat, { opacity: 0.92, duration: 0.1, delay: i * 0.02 }));
				cellMeshes.forEach((cell, i) => gsap.to(cell.material, { opacity: 0.88, duration: 0.08, delay: i * 0.0015 }));
				cellSprites.forEach((sprite, i) => gsap.to(sprite.material, { opacity: 1, duration: 0.08, delay: i * 0.0015 }));
				rowLabels.forEach((label, i) => gsap.to(label.material, { opacity: 1, duration: 0.1, delay: i * 0.015 }));

				for (let i = 0; i < 6; i += 1) {
					animateTokenToScaled(entering[i], inputSlots[i], 0.62, 0.34, i * 0.04, 0.12);
					await wait(14);
				}

				await wait(240);

				const rowBitTokens = [entering[0], entering[5]];
				rowBitTokens.forEach((token, i) => {
					animateTokenToScaled(token, rowBitPositions[i], 0.52, 0.36, i * 0.04, 0.06);
				});
				await wait(300);

				gsap.to(rowLabels[row].material.color, { r: 0.15, g: 0.43, b: 0.84, duration: 0.12 });
				gsap.to(rowLabels[row].material, { opacity: 1, duration: 0.1, yoyo: true, repeat: 1 });
				for (let c = 0; c < 16; c += 1) {
					const cell = cellMeshes[row * 16 + c];
					gsap.to(cell.material.color, { r: 0.74, g: 0.84, b: 0.95, duration: 0.16 });
					gsap.to(cell.material, { emissiveIntensity: 0.46, duration: 0.16 });
				}

				await wait(260);

				const columnBitTokens = entering.slice(1, 5);
				columnBitTokens.forEach((token, i) => {
					animateTokenToScaled(token, colBitPositions[i], 0.52, 0.36, i * 0.03, 0.05);
				});
				await wait(300);

				for (let r = 0; r < 4; r += 1) {
					const cell = cellMeshes[r * 16 + col];
					gsap.to(cell.material.color, { r: 0.78, g: 0.87, b: 0.96, duration: 0.16 });
					gsap.to(cell.material, { emissiveIntensity: 0.5, duration: 0.16 });
				}

				await wait(320);

				const selectedCell = cellMeshes[row * 16 + col];
				const selectedSprite = cellSprites[row * 16 + col];
				gsap.to(selectedCell.material, { emissiveIntensity: 0.82, duration: 0.16, yoyo: true, repeat: 1 });
				gsap.to(selectedCell.material.color, { r: 0.72, g: 0.86, b: 0.98, duration: 0.14 });
				gsap.to(selectedSprite.material, { opacity: 1, duration: 0.1, yoyo: true, repeat: 1 });

				const decimalBadge = textSprite(String(SBOX[s][row][col]), 150, 84, "800 44px Menlo", "#1f57c8", 0.46, 0.24);
				decimalBadge.position.copy(selectedCell.position).add(new THREE.Vector3(0, 0.26, 0.18));
				tableGroup.add(decimalBadge);
				gsap.to(decimalBadge.material, { opacity: 1, duration: 0.12 });
				gsap.to(decimalBadge.scale, { x: 0.52, y: 0.28, z: 1, duration: 0.18, ease: "back.out(1.7)" });

				await wait(320);

				const intersectionWorld = new THREE.Vector3();
				selectedCell.getWorldPosition(intersectionWorld);
				for (let j = 0; j < 4; j += 1) {
					const bit = outBits[outStart + j];
					const spawn = intersectionWorld.clone().add(new THREE.Vector3((j - 1.5) * 0.08, 0.12, 0));
					const tok = makeBit(bit, spawn, "xor");
					tok.mesh.scale.set(0.46, 0.46, 0.46);
					outputs.push(tok);
					gsap.to(tok.mesh.scale, { x: 0.9, y: 0.9, z: 0.9, duration: 0.18, ease: "back.out(1.7)" });
					animateTokenTo(tok, groupedOutputTargets[s][j], 0.38, j * 0.02, 0.04);
					glowBitToken(tok, bit, bit ? 0.54 : 0.24);
				}

				await wait(280);
				gsap.to(decimalBadge.material, { opacity: 0, duration: 0.12, onComplete: () => removeObject(decimalBadge) });
				gsap.to(title.material, { opacity: 0, duration: 0.14, onComplete: () => removeObject(title) });
				inputSlotMeshes.forEach((slot, i) => gsap.to(slot.material, { opacity: 0, duration: 0.1, delay: i * 0.01, onComplete: () => removeObject(slot) }));
				rowIndicatorMeshes.forEach((mesh, i) => gsap.to(mesh.material, { opacity: 0, duration: 0.12, delay: i * 0.01, onComplete: () => removeObject(mesh) }));
				colIndicatorMeshes.forEach((mesh, i) => gsap.to(mesh.material, { opacity: 0, duration: 0.12, delay: i * 0.01, onComplete: () => removeObject(mesh) }));
				rowBitTokens.concat(columnBitTokens).forEach((token, i) => {
					token.mesh.material.transparent = true;
					gsap.to(token.mesh.material, {
						opacity: 0,
						duration: 0.12,
						delay: i * 0.01,
						onComplete: () => removeObject(token.mesh)
					});
				});
				rowLabels.forEach((label, i) => gsap.to(label.material, { opacity: 0, duration: 0.1, delay: i * 0.01, onComplete: () => removeObject(label) }));
				cellMeshes.forEach((cell, i) => gsap.to(cell.material, { opacity: 0, duration: 0.1, delay: i * 0.0015, onComplete: () => removeObject(cell) }));
				cellSprites.forEach((sprite, i) => gsap.to(sprite.material, { opacity: 0, duration: 0.1, delay: i * 0.0015, onComplete: () => removeObject(sprite) }));
				tableLegs.forEach((leg, i) => gsap.to(leg.material, { opacity: 0, duration: 0.12, delay: i * 0.01, onComplete: () => removeObject(leg) }));
				gsap.to(rimMat, { opacity: 0, duration: 0.14, onComplete: () => removeObject(rim) });
				gsap.to(plateMat, { opacity: 0, duration: 0.14, onComplete: () => removeObject(plate) });
				gsap.to(tableGroup.position, {
					y: tableGroup.position.y - 0.1,
					duration: 0.16,
					ease: "power1.inOut",
					onComplete: () => removeObject(tableGroup)
				});

				if (s < 7) {

						new THREE.Vector3(tableCenters[s + 1].x, 8.9, tableCenters[s + 1].z + 2.2),
						new THREE.Vector3(tableCenters[s + 1].x, tableCenters[s + 1].y - 0.28, tableCenters[s + 1].z - 0.05),
						0.42
					);
				}
			}

			resetSectionSpeed();
			stage("S-Boxes", "Collect the 32-bit S-box output row.");
			await fitCameraToTokens(outputs, {
				padding: 1.22,
				duration: 0.92,
				minDistance: 12.8,
				extraDistance: 2.6
			});

			const outputBounds = tokenBounds(outputs);
			const outputCenter = outputBounds ? outputBounds.getCenter(new THREE.Vector3()) : new THREE.Vector3(0, outputY, outputZ);
			await moveCamera(
				new THREE.Vector3(outputCenter.x, 8.2, outputCenter.z + 9.9),
				new THREE.Vector3(outputCenter.x, outputCenter.y - 0.2, outputCenter.z),
				0.78
			);

			const mergedRowY = outputCenter.y;
			const mergedRowZ = outputCenter.z;
			const mergedRowStartX = -((32 - 1) * 0.34) / 2;
			const mergedTargets = layoutLine(32, mergedRowStartX, mergedRowY, mergedRowZ, 0.34);
			for (let i = 0; i < outputs.length; i += 1) {
				animateTokenTo(outputs[i], mergedTargets[i], 0.3, i * 0.004, 0.14);
			}
			await wait(620);
			return outputs;
		}

		async function showStraightPermutation(sboxOut32) {
			stage("Permutation P", "Reorder the 32 S-box output bits.");
			await wait(STAGE_DELAY_MS);

			const bounds = tokenBounds(sboxOut32);

			});

				new THREE.Vector3(cx, -0.95, z + 0.65),

		async function restoreOriginalKeyBitsBeforeOverflow(key56Tokens, finalRowTokens) {
			if (!key56Tokens || key56Tokens.length === 0) return [];
			const keyTokens = key56Tokens.filter(token => token && token.mesh);
			if (keyTokens.length === 0) return [];

			const rowBoundsNow = tokenBounds(finalRowTokens);
			const rowCenter = rowBoundsNow ? rowBoundsNow.getCenter(new THREE.Vector3()) : new THREE.Vector3(0, SHARED_ROW_AXIS.bitY, SHARED_ROW_AXIS.bitZ);
			const rowY = rowCenter.y;
			const rowZ = rowCenter.z - 2.6;
			const keyStep = SHARED_ROW_AXIS.bitSpacing;
			const keySplitGap = 1.8;
			const halfCount = Math.floor(keyTokens.length / 2);
			const keyStartX = (rowBoundsNow ? rowBoundsNow.max.x : rowCenter.x) + 3.2;
			const buildHalfTargets = () => {
				const leftTargets = layoutLine(halfCount, keyStartX, rowY, rowZ, keyStep);
				const rightStartX = keyStartX + (halfCount * keyStep) + keySplitGap;
				const rightTargets = layoutLine(halfCount, rightStartX, rowY, rowZ, keyStep);
				return leftTargets.concat(rightTargets);
			};

			stage("Key Schedule", "Move the key bits aside for overflow processing.");
			await wait(STAGE_DELAY_MS);

			const initialTargets = buildHalfTargets();
			for (let i = 0; i < keyTokens.length; i += 1) {
				animateTokenTo(keyTokens[i], initialTargets[i], 0.34, i * 0.0016, 0.12);
			}
			await wait(720);

			await fitCameraToTokens(keyTokens, {
				padding: 1.2,
				duration: 0.82,
				minDistance: 11.2,
				extraDistance: 2.1
			});

			stage("Key Schedule", "Restore the original key order.");
			await wait(STAGE_DELAY_MS);

			let working = keyTokens.slice();
			for (let roundIndex = SHIFT_SCHEDULE.length - 1; roundIndex >= 0; roundIndex -= 1) {
				const shift = SHIFT_SCHEDULE[roundIndex];
				const leftHalf = rotateRight(working.slice(0, halfCount), shift);
				const rightHalf = rotateRight(working.slice(halfCount), shift);
				working = leftHalf.concat(rightHalf);

				const roundTargets = buildHalfTargets();

				for (let i = 0; i < working.length; i += 1) {
					animateTokenTo(working[i], roundTargets[i], 0.22, i * 0.0008, 0.08);
				}
				await wait(250);
			}

			const finalTargets = buildHalfTargets();
			for (let i = 0; i < working.length; i += 1) {
				animateTokenTo(working[i], finalTargets[i], 0.28, i * 0.001, 0.08);
			}
			await wait(520);

			const mergedStartX = keyStartX;
			const mergedTargets = layoutLine(working.length, mergedStartX, rowY, rowZ, keyStep);
			for (let i = 0; i < working.length; i += 1) {
				animateTokenTo(working[i], mergedTargets[i], 0.32, i * 0.001, 0.08);
			}
			await wait(640);

			return working;
		}

		function chunkText(text, size) {
			const chunks = [];
			for (let i = 0; i < text.length; i += size) chunks.push(text.slice(i, i + size));
			return chunks;
		}

		async function animateDesPipeline(tokens64, inputTargets, outputTargets, outputBits, keyBits64 = null, keyInjectionMode = "original", keySourceTokens = null) {
			if (!tokens64 || tokens64.length !== 64 || !inputTargets || inputTargets.length < 64 || !outputTargets || outputTargets.length < 64 || !outputBits || outputBits.length !== 64) return;

			const inputBounds = new THREE.Box3().setFromPoints(inputTargets);
			const inputCenterZRaw = inputBounds.getCenter(new THREE.Vector3()).z;
			const outputCenterZRaw = new THREE.Box3().setFromPoints(outputTargets).getCenter(new THREE.Vector3()).z;
			const minRowSeparationZ = 8.5;
			const rowSeparationRaw = outputCenterZRaw - inputCenterZRaw;
			let effectiveOutputTargets = outputTargets;
			if (Math.abs(rowSeparationRaw) < minRowSeparationZ) {
				const separationDir = Math.sign(rowSeparationRaw) || 1;
				const requiredShift = separationDir * (minRowSeparationZ - Math.abs(rowSeparationRaw));
				effectiveOutputTargets = outputTargets.map(point => point.clone().add(new THREE.Vector3(0, 0, requiredShift)));
			}

			const outputBounds = new THREE.Box3().setFromPoints(effectiveOutputTargets);
			const allBounds = new THREE.Box3().setFromPoints(inputTargets.concat(effectiveOutputTargets));
			const center = allBounds.getCenter(new THREE.Vector3());
			const rowY = center.y;
			const rowPlaneY = rowY;
			const inputCenterZ = inputBounds.getCenter(new THREE.Vector3()).z;
			const outputCenterZ = outputBounds.getCenter(new THREE.Vector3()).z;
			const desVisualScale = 3;
			const funnelWidthScale = 0.65;
			const funnelHeightScale = 1.0;
			const bodyWidth = 3.4 * desVisualScale;
			const bodyHeight = 0.04 * desVisualScale;
			const bodyDepth = 1.15 * desVisualScale;
			const bodyHalfDepth = bodyDepth / 2;

			const inSpanX = Math.max(0.8, inputBounds.max.x - inputBounds.min.x);
			const outSpanX = Math.max(0.8, outputBounds.max.x - outputBounds.min.x);
			const rowFunnelGap = 0.52;
			const boxCenterZ = (inputCenterZ + outputCenterZ) / 2;
			const inputTowardBox = Math.sign(boxCenterZ - inputCenterZ) || 1;
			const outputFromBox = Math.sign(outputCenterZ - boxCenterZ) || -1;
			const inputRowGapEdgeZ = inputCenterZ + (inputTowardBox * rowFunnelGap);
			const outputRowGapEdgeZ = outputCenterZ - (outputFromBox * rowFunnelGap);
			const boxInputMouthZ = boxCenterZ - (inputTowardBox * (bodyHalfDepth + 0.04));
			const boxOutputMouthZ = boxCenterZ + (outputFromBox * (bodyHalfDepth + 0.04));
			const funnelLengthWorldBase = Math.max(0.75, Math.abs(inputRowGapEdgeZ - boxInputMouthZ));
			const outFunnelLengthWorldBase = Math.max(0.75, Math.abs(boxOutputMouthZ - outputRowGapEdgeZ));
			const funnelLengthWorld = funnelLengthWorldBase * funnelHeightScale;
			const outFunnelLengthWorld = outFunnelLengthWorldBase * funnelHeightScale;
			const funnelLength = funnelLengthWorld / desVisualScale;
			const outFunnelLength = outFunnelLengthWorld / desVisualScale;
			const inputFunnelRowEdgeZ = boxInputMouthZ - (inputTowardBox * funnelLengthWorld);
			const outputFunnelRowEdgeZ = boxOutputMouthZ + (outputFromBox * outFunnelLengthWorld);
			const boxMouthWidth = 1.5;
			const inputOuterWidth = Math.min(2.2, Math.max(1.1, inSpanX + 0.12)) * funnelWidthScale;
			const outputOuterWidth = Math.min(2.2, Math.max(1.1, outSpanX + 0.12)) * funnelWidthScale;
			const scaledBoxMouthWidth = boxMouthWidth * funnelWidthScale;

			function makeTrapezoidShape(length, nearWidth, farWidth) {
				const s = new THREE.Shape();
				s.moveTo(-farWidth / 2, length / 2);
				s.lineTo(farWidth / 2, length / 2);
				s.lineTo(nearWidth / 2, -length / 2);
				s.lineTo(-nearWidth / 2, -length / 2);
				s.closePath();
				return s;
			}

			const rig = new THREE.Group();
			rig.userData.dynamic = true;
			scene.add(rig);

			const bodyMat = new THREE.MeshStandardMaterial({ color: 0xe5edf7, roughness: 0.62, metalness: 0.08, transparent: true, opacity: 0 });
			const body = new THREE.Mesh(new THREE.BoxGeometry(bodyWidth, bodyHeight, bodyDepth), bodyMat);
			body.position.set(center.x, rowPlaneY, boxCenterZ);
			body.userData.dynamic = true;
			rig.add(body);

			const inFunnelMat = new THREE.MeshStandardMaterial({ color: 0xdbe7f5, roughness: 0.66, metalness: 0.06, transparent: true, opacity: 0, side: THREE.DoubleSide });
			const inFunnelGeom = new THREE.ShapeGeometry(makeTrapezoidShape(funnelLength * desVisualScale, scaledBoxMouthWidth * desVisualScale, inputOuterWidth * desVisualScale));
			const inFunnel = new THREE.Mesh(inFunnelGeom, inFunnelMat);
			inFunnel.rotation.x = -Math.PI / 2;
			if (boxCenterZ < inputCenterZ) inFunnel.rotation.y = Math.PI;
			inFunnel.position.set(center.x, rowPlaneY, (inputFunnelRowEdgeZ + boxInputMouthZ) / 2);
			inFunnel.userData.dynamic = true;
			rig.add(inFunnel);

			const outFunnelMat = new THREE.MeshStandardMaterial({ color: 0xdbe7f5, roughness: 0.66, metalness: 0.06, transparent: true, opacity: 0, side: THREE.DoubleSide });
			const outFunnelGeom = new THREE.ShapeGeometry(makeTrapezoidShape(outFunnelLength * desVisualScale, outputOuterWidth * desVisualScale, scaledBoxMouthWidth * desVisualScale));
			const outFunnel = new THREE.Mesh(outFunnelGeom, outFunnelMat);
			outFunnel.rotation.x = -Math.PI / 2;
			if (boxCenterZ > outputCenterZ) outFunnel.rotation.y = Math.PI;
			outFunnel.position.set(center.x, rowPlaneY, (boxOutputMouthZ + outputFunnelRowEdgeZ) / 2);
			outFunnel.userData.dynamic = true;
			rig.add(outFunnel);

			const labelCanvas = document.createElement("canvas");
			labelCanvas.width = 280;
			labelCanvas.height = 100;
			const labelCtx = labelCanvas.getContext("2d");
			labelCtx.clearRect(0, 0, 280, 100);
			labelCtx.fillStyle = "#2d4a66";
			labelCtx.font = "800 62px Avenir";
			labelCtx.textAlign = "center";
			labelCtx.textBaseline = "middle";
			labelCtx.fillText("DES", 140, 54);
			const labelTex = new THREE.CanvasTexture(labelCanvas);
			const label = new THREE.Sprite(new THREE.SpriteMaterial({ map: labelTex, transparent: true, depthTest: false, opacity: 0 }));
			label.scale.set(1.2 * desVisualScale, 0.42 * desVisualScale, 1);
			label.position.set(center.x, rowPlaneY + 0.32, boxCenterZ);
			label.userData.dynamic = true;
			rig.add(label);

			const frameBounds = new THREE.Box3().setFromPoints(inputTargets.concat(effectiveOutputTargets));

			[bitHeader, charHeader].forEach((spr, i) => {
				gsap.to(spr.material, { opacity: 1, duration: 0.36, delay: i * 0.08 });
			});
			bitRows.forEach((spr, i) => {
				gsap.to(spr.material, { opacity: 1, duration: 0.34, delay: 0.12 + i * 0.06 });
			});

			stage("Ciphertext", "Reveal the source characters beside the bit groups.");
			await wait(1700);

			const sourceChars = sourceText.split("").slice(0, decoded.length);
			while (sourceChars.length < decoded.length) sourceChars.push(" ");
			const charRows = [];
			for (let i = 0; i < sourceChars.length; i += 1) {
				const ch = sourceChars[i] === " " ? "_" : sourceChars[i];
				const row = addTrackedTextSprite(ch, 160, 120, "800 88px Avenir", "#224c73", 0.62, 0.42);
				const targetY = columnTopY - (i * rowStep);
				row.position.set(charColumnX, targetY + 2.4, compareZ);
				charRows.push({ row, targetY });
			}

			for (let i = 0; i < charRows.length; i += 1) {
				gsap.to(charRows[i].row.material, {
					opacity: 1,
					duration: 1.0,
					delay: i * 0.09,
					ease: "power2.out"
				});
				gsap.to(charRows[i].row.position, {
					y: charRows[i].targetY,
					duration: 1.45,
					delay: i * 0.09,
					ease: "power2.inOut"
				});
			}

			await wait(3600);
		}

		async function run() {
			applyAnimationSpeed(1);
			turboToRound16Requested = false;
			skipRoundBtn.textContent = "Fast Forward\nTo The End Of Round 16";
			skipRoundBtn.style.display = "block";
			skipRoundBtn.style.pointerEvents = "auto";
			skipRoundBtn.style.transform = "translateY(0px)";
			setSkipRoundButtonFilled(false);
			gsap.to(skipRoundBtn, {
				opacity: 1,
				duration: 0.22,
				delay: 0.1,
				ease: "power2.out"
			});

			const plain = (plaintextInput.value || "DES-DEMO").slice(0, 32);
			const keyText = (keyInput.value || "SeCr3t!!").slice(0, 8).padEnd(8, " ");
			const blockPlain = plain.padEnd(8, " ");
			updateFloorForCharacterSpan(blockPlain.length, keyText.length, "plaintext-intro");

			split.classList.add("takeover");
			await wait(560);
			gsap.to(entry, {
				opacity: 0,
				duration: 0.42,
				onComplete: () => {
					entry.style.display = "none";
				}
			});

			stage("Plaintext Bits", "Convert plaintext characters to 8-bit ASCII.");
			await wait(STAGE_DELAY_MS);
			await moveCamera(new THREE.Vector3(-0.6, 8, 14), new THREE.Vector3(-0.8, 0.2, 0.4), 1.1);

			const plainJourney = await charBitsJourney(blockPlain, "left", "data");
			const parkedPlaintextCopy = await createParkedPlaintextComparisonCopy(plainJourney.produced);

			stage("Key Bits", "Convert key characters to 7-bit ASCII.");
			await wait(STAGE_DELAY_MS);
			{
				const plaintextBounds = tokenBounds(plainJourney.produced);
				const predictedKeyStartX = plaintextBounds ? (plaintextBounds.max.x + SHARED_ROW_AXIS.bitGap) : 0;
				const predictedKeyTargets = layoutLine(64, predictedKeyStartX, SHARED_ROW_AXIS.bitY, SHARED_ROW_AXIS.bitZ, SHARED_ROW_AXIS.bitSpacing);
				updateFloorForBitRows(plainJourney.produced, predictedKeyTargets);
			}
			await moveCamera(new THREE.Vector3(14.5, 8.2, 12.8), new THREE.Vector3(14.2, 0, 0.9), 1.15);
			const keyJourney = await charBitsJourney(keyText, "right", "key");

			await arrangeRowWithGap(plainJourney.produced, "left", true);
			await arrangeRowWithGap(keyJourney.produced, "right", true);
			updateFloorForBitRows(plainJourney.produced, keyJourney.produced);

			stage("Input Rows", "Show the plaintext and key bit rows together.");
			await wait(STAGE_DELAY_MS);
			await fitCameraToTokens(plainJourney.produced.concat(keyJourney.produced), {
				padding: 1.14,
				duration: 1.15,
				minDistance: 14,
				extraDistance: 3.0
			});
			await wait(500);

			stage("Plaintext", "Center on the plaintext row.");
			await wait(STAGE_DELAY_MS);
			await fitCameraToTokens(plainJourney.produced, {
				padding: 1.12,
				duration: 0.95,
				minDistance: 10.5,
				extraDistance: 2.1
			});
			const plain64 = plainJourney.first64;
			const key64 = keyJourney.first64;
			const rightMost64 = plainJourney.produced.slice(Math.max(0, plainJourney.produced.length - 64));
			const rightMost64Bounds = tokenBounds(rightMost64);
			const chosen64TargetStartX = rightMost64Bounds ? rightMost64Bounds.min.x : (tokenBounds(plain64)?.min.x ?? 0);
			await bounceTokensOnce(plain64, 0.5);
			await wait(420);

			if (plainJourney.overflow.length > 0) {
				stage("Plaintext", "Move overflow bits out of the main row.");
				await wait(STAGE_DELAY_MS);
				await sendOverflowOffscreen(plainJourney.overflow, "left");

				stage("Plaintext", "Keep the 64-bit row aligned with the key gap.");
				await wait(STAGE_DELAY_MS);
				const chosen64Bounds = tokenBounds(plain64);
				const chosen64Center = chosen64Bounds ? chosen64Bounds.getCenter(new THREE.Vector3()) : null;
				const chosen64RowY = chosen64Center ? chosen64Center.y : SHARED_ROW_AXIS.bitY;
				const chosen64RowZ = chosen64Center ? chosen64Center.z : SHARED_ROW_AXIS.bitZ;
				const chosen64Targets = layoutLine(64, chosen64TargetStartX, chosen64RowY, chosen64RowZ, SHARED_ROW_AXIS.bitSpacing);
				plain64.forEach((token, i) => animateTokenTo(token, chosen64Targets[i], 0.32, i * 0.002, 0.18));
				await wait(760);
			}

			stage("Initial Permutation", "Prepare the 64-bit plaintext block.");
			await wait(STAGE_DELAY_MS);
			await arrangeFirst64Row(plain64, "left", true);
			stage("Initial Permutation", "Apply IP to the plaintext block.");
			await wait(STAGE_DELAY_MS);
			const ipPermuted = await showInitialPermutationRow(plain64, "left");
			await arrangeFirst64Row(ipPermuted, "left", false);
			await fitCameraToTokens(ipPermuted, {
				padding: 1.14,
				duration: 0.9,
				minDistance: 11.5,
				extraDistance: 2.2
			});
			const plainHalves = await splitIntoHalves(ipPermuted, "left", "Split to L0 / R0");
			const l0HomeTargets = plainHalves.left.map(token => tokenWorldPoint(token));
			const r0HomeTargets = plainHalves.right.map(token => tokenWorldPoint(token));
			await fitCameraToTokens(plainHalves.left.concat(plainHalves.right), {
				padding: 1.14,
				duration: 0.7,
				minDistance: 11.5,
				extraDistance: 2.2
			});

			stage("Key Schedule", "Prepare the key block.");
			await wait(STAGE_DELAY_MS);
			await arrangeFirst64Row(key64, "right", false);

			stage("Permuted Choice 1", "Reduce the key to 56 bits.");
			await wait(STAGE_DELAY_MS);
			const pc1Row = await showPermutedChoice1(key64);
			const keyRowLeftEdge = tokenBounds(key64)?.min.x ?? rowBounds.right?.start ?? 0;
			const keyRowOriginStart = keyRowLeftEdge;
			pc1Row.forEach((token, i) => {
				token.mesh.position.x = keyRowOriginStart + (i * SHARED_ROW_AXIS.bitSpacing);
			});

			let currentLeft = plainHalves.left;
			let currentRight = plainHalves.right;
			let key56State = pc1Row;
			setRoundSpeedFactor(turboToRound16Requested ? TURBO_ROUND_SPEED_FACTOR : 1);

			for (let round = 1; round <= 16; round += 1) {
				const roundSpeedFactor = turboToRound16Requested
					? TURBO_ROUND_SPEED_FACTOR
					: (round === 1 ? 1 : (round === 2 ? 2 : (round === 3 ? 10 : 20)));
				setRoundSpeedFactor(roundSpeedFactor);
				activeStageRoundPrefix = round === 1 ? "" : `Round ${round}/16:`;
				stage("Feistel Round", `Expand R, mix K${round}, and update the halves.`);
				await wait(STAGE_DELAY_MS);

				const expandedRoundRight = await showExpansionPermutation(currentRight, "left");
				const keyScheduleResult = await keyShiftAndContract(key56State, round);
				key56State = keyScheduleResult.nextKey56;

				stage("XOR", `XOR E(R${round - 1}) with K${round}.`);
				await wait(STAGE_DELAY_MS);

				const xorBits = await xorOverlay(expandedRoundRight, keyScheduleResult.key48);
				const sboxOut = await sboxJourney(xorBits);
				const pOut = await showStraightPermutation(sboxOut);
				const nextRight = await feistelXorWithLeftHalf(currentLeft, pOut);
				const nextHalves = await finalizeRoundOneHalves(currentRight, nextRight, l0HomeTargets, r0HomeTargets, round, 16);
				currentLeft = nextHalves.l1;
				currentRight = nextHalves.r1;
				if (round === 1) setSkipRoundButtonFilled(true);
			}
			activeStageRoundPrefix = "";
			setRoundSpeedFactor(1);
			resetSectionSpeed();
			skipRoundBtn.style.pointerEvents = "none";
			skipRoundBtn.style.display = "none";
			const mergedFinal = await mergeFinalHalvesIntoOneRow(currentLeft, currentRight);
			let finalProcessedTokens = mergedFinal;
			const restoredKeyTokens = await restoreOriginalKeyBitsBeforeOverflow(key56State, mergedFinal);
			const hasOverflowBits = !!(plainJourney.overflow && plainJourney.overflow.length > 0);
			if (hasOverflowBits) {
				if (restoredKeyTokens && restoredKeyTokens.length > 0) {
					stage("Apply the DES encryption to the remaining bits.", "Continue with the remaining encrypted blocks.");
					await wait(STAGE_DELAY_MS);
				}
				finalProcessedTokens = await appendOverflowAndTransformBlocks(mergedFinal, plainJourney.overflow, plain, keyText, "left", restoredKeyTokens);
			} else if (restoredKeyTokens && restoredKeyTokens.length > 0) {
				stage("Key Schedule", "Remove the restored key bits.");
				for (let i = 0; i < restoredKeyTokens.length; i += 1) {
					const token = restoredKeyTokens[i];
					if (token.mesh && token.mesh.material) {
						token.mesh.material.transparent = true;
						gsap.to(token.mesh.material, {
							opacity: 0,
							duration: 0.24,
							delay: i * 0.001,
							ease: "power2.in",
							onComplete: () => removeObject(token.mesh)
						});
					}
				}
				await wait(360);
			}

			await overlayParkedPlaintextComparison(parkedPlaintextCopy, finalProcessedTokens);

			stage("Ciphertext", "The completed ciphertext row is ready.");
		}

		function animate() {
			requestAnimationFrame(animate);
			camera.lookAt(
				cameraTarget.x + Math.sin(performance.now() * 0.00045) * 0.03,
				cameraTarget.y,
				cameraTarget.z
			);
			renderer.render(scene, camera);
		}
		animate();

		window.addEventListener("resize", () => {
			camera.aspect = window.innerWidth / window.innerHeight;
			camera.updateProjectionMatrix();
			renderer.setSize(window.innerWidth, window.innerHeight);
		});

		split.addEventListener("submit", async ev => {
			ev.preventDefault();
			if (isMobileOrTablet) return;
			if ((keyInput.value || "").length < 1) return;
			split.style.pointerEvents = "none";
			await run();
		});

		skipRoundBtn.addEventListener("click", () => {
			setTurboSkipRequested();
		});
	</script>
</body>
</html>
